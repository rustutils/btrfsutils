[package]
name = "btrfs-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["derive", "wrap_help"] }
env_logger = "0.11.9"
log = "0.4.29"
nix = { version = "0.31.2", features = ["ioctl", "fs"] }
uuid = { version = "1", features = ["v4", "v7"] }
btrfs-uapi = { path = "../uapi" }
