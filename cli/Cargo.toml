[package]
name = "btrfs-cli"
version.workspace = true
edition.workspace = true
description = "User-space command-line tool for inspecting and managing Btrfs filesystems"
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
categories = ["command-line-utilities", "filesystem"]
keywords = ["btrfs", "filesystem", "cli", "linux", "storage"]
default-run = "btrfs"

[[bin]]
name = "btrfs"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
libc = { workspace = true }
env_logger = { workspace = true }
log = { workspace = true }
nix = { workspace = true }
uuid = { workspace = true }
btrfs-uapi = { workspace = true }
btrfs-disk = { workspace = true }
btrfs-stream = { workspace = true, features = ["receive"] }
chrono = { version = "0.4.44", default-features = false, features = ["clock"] }
flate2 = "1"
zstd = "0.13"
lzokay = "2"
regex-lite = "0.1"

[dev-dependencies]
insta = "1"
tempfile = "3"
