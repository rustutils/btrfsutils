[package]
name = "btrfs-cli"
version.workspace = true
edition.workspace = true
description = "User-space command-line tool for managing Btrfs filesystems"
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
categories = ["command-line-utilities", "filesystem"]
keywords = ["btrfs", "filesystem", "cli", "linux", "storage"]

[[bin]]
name = "btrfs"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
env_logger = { workspace = true }
log = { workspace = true }
nix = { workspace = true }
uuid = { workspace = true }
btrfs-uapi = { path = "../uapi", version = "0.2.0" }
btrfs-disk = { path = "../disk", version = "0.2.0" }
flate2 = "1"
zstd = "0.13"
lzo1x = "0.2"
clap_mangen = { version = "0.2", optional = true }

[features]
mangen = ["dep:clap_mangen"]

[[bin]]
name = "btrfs-mangen"
path = "src/bin/btrfs-mangen.rs"
required-features = ["mangen"]

[dev-dependencies]
insta = "1"
regex-lite = "0.1"
tempfile = "3"
