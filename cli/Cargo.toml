[package]
name = "btrfs-cli"
version = "0.2.0"
edition = "2024"
description = "A Rust implementation of the btrfs command-line tool"
license = "GPL-2.0-only"
repository = "https://github.com/rustutils/btrfs-progrs"
homepage = "https://github.com/rustutils/btrfs-progrs"
readme = "README.md"
categories = ["command-line-utilities", "filesystem"]
keywords = ["btrfs", "filesystem", "cli", "linux", "storage"]

[[bin]]
name = "btrfs"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
env_logger = { workspace = true }
log = { workspace = true }
nix = { workspace = true }
uuid = { workspace = true }
btrfs-uapi = { path = "../uapi", version = "0.2.0" }
btrfs-disk = { path = "../disk", version = "0.2.0" }

[dev-dependencies]
insta = "1"
tempfile = "3"
