[graph]
targets = []
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "MPL-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
name = "btrfs-cli"
allow = ["GPL-2.0-only"]

[[licenses.exceptions]]
name = "btrfs-mkfs"
allow = ["GPL-2.0-only"]

[[licenses.exceptions]]
name = "btrfs-tune"
allow = ["GPL-2.0-only"]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
# `btrfs-test-utils` is a workspace-internal, dev-only crate
# (`publish = false`); its workspace declaration has no `version`
# so cargo strips it from published manifests. That makes it look
# like a wildcard requirement to cargo-deny, but only for path
# deps that never hit a registry — allow those.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
