[package]
name = "btrfs-stream"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Btrfs send stream parser and receive operations"
readme = "README.md"
categories = ["filesystem", "parser-implementations"]
keywords = ["btrfs", "filesystem", "send", "receive", "stream"]

[dependencies]
anyhow = { workspace = true }
crc32c = { workspace = true }
uuid = { workspace = true }

# receive feature dependencies
btrfs-uapi = { workspace = true, optional = true }
nix = { workspace = true, optional = true }
flate2 = { version = "1", optional = true }
zstd = { version = "0.13", optional = true }
lzo1x = { version = "0.2", optional = true }

[features]
receive = ["dep:btrfs-uapi", "dep:nix", "dep:flate2", "dep:zstd", "dep:lzo1x"]
