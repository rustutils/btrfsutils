stages:
  - test
  - build
  - pages

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  RUSTUP_HOME: "${CI_PROJECT_DIR}/.rustup"
  DEBIAN_FRONTEND: noninteractive

default:
  image: rust:latest
  before_script:
    - rustup default stable
    - apt-get update -qq && apt-get install -y -qq clang btrfs-progs > /dev/null
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .cargo/registry
      - .cargo/git
      - target/

lint:
  stage: test
  script:
    - rustup toolchain install nightly --component rustfmt
    - cargo +nightly fmt --all --check
    - RUSTFLAGS="-D warnings" cargo check --all-targets

test:
  stage: test
  script:
    - cargo test

build-x86:
  stage: build
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/btrfs
    expire_in: 1 week

build-x86-musl:
  stage: build
  script:
    - apt-get install -y -qq musl-tools > /dev/null
    - rustup target add x86_64-unknown-linux-musl
    - cargo build --release --target x86_64-unknown-linux-musl
  artifacts:
    paths:
      - target/x86_64-unknown-linux-musl/release/btrfs
    expire_in: 1 week

pages:
  stage: pages
  image: alpine:latest
  before_script: []
  script:
    - apk add --no-cache mdbook
    - mdbook build
    - mv target/book public
  artifacts:
    paths:
      - public
  cache: {}
  only:
    - master
