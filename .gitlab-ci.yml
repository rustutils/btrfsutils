stages:
  - check
  - build
  - deploy

check:
  image: nixos/nix:latest
  stage: check
  before_script:
    - echo 'experimental-features = nix-command flakes' >> /etc/nix/nix.conf
  script:
    - nix flake check -L

build:
  image: nixos/nix:latest
  stage: build
  before_script:
    - echo 'experimental-features = nix-command flakes' >> /etc/nix/nix.conf
  script:
    - nix build . -L
    - cp -r $(readlink result) public
  artifacts:
    paths:
      - public/
    expire_in: 1 week
  only:
    - master

pages:
  image: alpine
  stage: deploy
  script:
    - apk add mdbook
    - mdbook build
    - mv target/book public
  artifacts:
    paths:
      - public
  only:
    - master
